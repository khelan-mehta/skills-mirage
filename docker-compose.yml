version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: skills-mirage-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skills-mirage

  redis:
    image: redis:7-alpine
    container_name: skills-mirage-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: skills-mirage-chroma
    ports:
      - '8000:8000'
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: skills-mirage-api
    ports:
      - '5000:5000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/skills-mirage
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PORT=5000
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - chromadb
    volumes:
      - ./src/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: skills-mirage-web
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo-data:
  redis-data:
  chroma-data:
